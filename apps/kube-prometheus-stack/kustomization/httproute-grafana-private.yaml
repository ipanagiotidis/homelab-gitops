apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-private
  namespace: monitoring
spec:
  parentRefs:
  - name: private
    namespace: traefik
    sectionName: websecure-gfn
  hostnames:
  - gfn.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: kube-prometheus-stack-grafana
      port: 80
