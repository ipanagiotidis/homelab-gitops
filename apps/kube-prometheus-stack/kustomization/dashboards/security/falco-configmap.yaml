apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-security-falco
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/Security
data:
  falco.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "panels": [],
          "title": "Overview",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "orange", "value": 3}, {"color": "green", "value": 6}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 4, "x": 0, "y": 1},
          "id": 2,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "count(up{job=\"falco-metrics\"} == 1)", "refId": "A"}],
          "title": "Falco Pods Up",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 5, "w": 4, "x": 4, "y": 1},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum(rate(falcosecurity_falco_rules_matches_total[5m]))", "refId": "A"}],
          "title": "Rule Matches/s",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 4, "x": 8, "y": 1},
          "id": 4,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum(increase(falcosecurity_falco_rules_matches_total{priority=\"2\"}[1h]))", "refId": "A"}],
          "title": "Critical Matches (1h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 5, "w": 4, "x": 12, "y": 1},
          "id": 5,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "count(count by (rule_name) (increase(falcosecurity_falco_rules_matches_total[24h]) > 0))", "refId": "A"}],
          "title": "Unique Rules (24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 5}]}, "unit": "ops"}, "overrides": []},
          "gridPos": {"h": 5, "w": 4, "x": 16, "y": 1},
          "id": 6,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum(rate(falcosecurity_scap_n_drops_total[5m]))", "refId": "A"}],
          "title": "Kernel Drops/s",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 1}, {"color": "red", "value": 3}]}, "unit": "ops"}, "overrides": []},
          "gridPos": {"h": 5, "w": 4, "x": 20, "y": 1},
          "id": 7,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum(rate(falcosecurity_falco_outputs_queue_num_drops_total[5m]))", "refId": "A"}],
          "title": "Output Queue Drops/s",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 6},
          "id": 8,
          "panels": [],
          "title": "Detections",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 7},
          "id": 9,
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "topk(10, sum by (rule_name) (increase(falcosecurity_falco_rules_matches_total[24h])))", "legendFormat": "{{rule_name}}", "refId": "A"}],
          "title": "Top Rules (24h)",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 7},
          "id": 10,
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum by (priority) (increase(falcosecurity_falco_rules_matches_total[24h]))", "legendFormat": "priority {{priority}}", "refId": "A"}],
          "title": "Matches by Priority (24h)",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 7},
          "id": 11,
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "topk(10, sum by (pod) (increase(falcosecurity_falco_rules_matches_total[24h])))", "legendFormat": "{{pod}}", "refId": "A"}],
          "title": "Where It Fired: Top Falco Pods (24h)",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 15},
          "id": 12,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [{"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum by (pod) (rate(falcosecurity_falco_rules_matches_total[5m]))", "legendFormat": "{{pod}}", "refId": "A"}],
          "title": "Rule Matches by Pod",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "$prometheus"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "ops"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 15},
          "id": 13,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum(rate(falcosecurity_scap_n_evts_total[5m]))", "legendFormat": "events/s", "refId": "A"},
            {"datasource": {"type": "prometheus", "uid": "$prometheus"}, "expr": "sum(rate(falcosecurity_scap_n_drops_total[5m]))", "legendFormat": "drops/s", "refId": "B"}
          ],
          "title": "Syscall Event and Drop Rate",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23},
          "id": 14,
          "panels": [],
          "title": "Event Context",
          "type": "row"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}, "overrides": []},
          "gridPos": {"h": 6, "w": 24, "x": 0, "y": 24},
          "id": 15,
          "options": {"legend": {"calcs": [], "displayMode": "list", "placement": "bottom", "showLegend": true}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [
            {"datasource": {"type": "loki", "uid": "$logs"}, "editorMode": "code", "expr": "sum(count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\".+\" | priority=~\"$priority\" [$__interval]))", "queryType": "range", "refId": "A"}
          ],
          "title": "Recent Event Volume (Loki)",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "gridPos": {"h": 14, "w": 24, "x": 0, "y": 30},
          "id": 16,
          "options": {"dedupStrategy": "exact", "enableLogDetails": true, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true},
          "targets": [
            {"datasource": {"type": "loki", "uid": "$logs"}, "editorMode": "code", "expr": "{namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\".+\" | priority=~\"$priority\" | line_format \"{{.time}} | {{.priority}} | {{.rule}} | host={{.hostname}} | {{.output}}\"", "queryType": "range", "refId": "A"}
          ],
          "title": "Recent Falco Events",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["security", "falco"],
      "templating": {
        "list": [
          {
            "current": {"selected": true, "text": "Prometheus", "value": "Prometheus"},
            "hide": 0,
            "includeAll": false,
            "label": "Prometheus",
            "multi": false,
            "name": "prometheus",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {"selected": true, "text": "Loki", "value": "Loki"},
            "hide": 0,
            "includeAll": false,
            "label": "Loki",
            "multi": false,
            "name": "logs",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          },
          {
            "current": {"selected": true, "text": ".*", "value": ".*"},
            "hide": 0,
            "includeAll": false,
            "label": "Priority",
            "multi": false,
            "name": "priority",
            "options": [
              {"selected": true, "text": ".*", "value": ".*"},
              {"selected": false, "text": "Critical", "value": "Critical"},
              {"selected": false, "text": "Error", "value": "Error"},
              {"selected": false, "text": "Warning", "value": "Warning"},
              {"selected": false, "text": "Notice", "value": "Notice"},
              {"selected": false, "text": "Informational", "value": "Informational"},
              {"selected": false, "text": "Debug", "value": "Debug"}
            ],
            "query": "Critical",
            "skipUrlSync": false,
            "type": "custom"
          }
        ]
      },
      "time": {"from": "now-6h", "to": "now"},
      "timezone": "browser",
      "title": "Falco Runtime",
      "version": 2
    }
