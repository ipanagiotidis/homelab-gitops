apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./crowdsec-configmap.yaml
configMapGenerator:
  - name: grafana-dashboard-security-kyverno
    files:
      - kyverno.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        k8s-sidecar-target-directory: /tmp/dashboards/Security
  - name: grafana-dashboard-security-trivy-operator
    files:
      - trivy-operator.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
      annotations:
        k8s-sidecar-target-directory: /tmp/dashboards/Security
