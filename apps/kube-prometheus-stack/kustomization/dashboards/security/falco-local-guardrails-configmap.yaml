apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-security-falco-local-guardrails
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/Security
data:
  falco-local-guardrails.json: |-
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "panels": [],
          "title": "Local Guardrails Overview",
          "type": "row"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 1},
          "id": 2,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "sum(count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" [$__range]))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Local Guardrail Events",
          "type": "stat"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 1},
          "id": 3,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "count(sum by (rule) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" [$__range])))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Local Rules Triggered",
          "type": "stat"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 1},
          "id": 4,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "count(sum by (output_fields_k8s_ns_name) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" | output_fields_k8s_ns_name=~\".+\" [$__range])))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Namespaces Impacted",
          "type": "stat"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "thresholds"}, "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}}, "overrides": []},
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 1},
          "id": 5,
          "options": {"colorMode": "value", "graphMode": "area", "justifyMode": "auto", "orientation": "auto", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "textMode": "auto"},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "count(sum by (output_fields_k8s_pod_name) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" | output_fields_k8s_pod_name=~\".+\" [$__range])))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Pods Impacted",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 6},
          "id": 6,
          "panels": [],
          "title": "Local Guardrails Detail",
          "type": "row"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 0, "y": 7},
          "id": 7,
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "topk(10, sum by (rule) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" [$__range])))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Top Local Rules",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 7},
          "id": 8,
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "topk(10, sum by (output_fields_k8s_ns_name) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" | output_fields_k8s_ns_name=~\".+\" [$__range])))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Top Namespaces",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}, "unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 7},
          "id": 9,
          "options": {"displayMode": "gradient", "orientation": "horizontal", "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "showUnfilled": true},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "topk(10, sum by (output_fields_k8s_pod_name) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" | output_fields_k8s_pod_name=~\".+\" [$__range])))",
              "queryType": "instant",
              "refId": "A"
            }
          ],
          "title": "Top Pods",
          "type": "bargauge"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "fieldConfig": {"defaults": {"color": {"mode": "palette-classic"}}, "overrides": []},
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 15},
          "id": 10,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "sum by (rule) (count_over_time({namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" [$__interval]))",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Local Guardrail Trigger Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "loki", "uid": "$logs"},
          "gridPos": {"h": 16, "w": 24, "x": 0, "y": 23},
          "id": 11,
          "options": {"dedupStrategy": "exact", "enableLogDetails": true, "prettifyLogMessage": false, "showCommonLabels": false, "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "$logs"},
              "editorMode": "code",
              "expr": "{namespace=\"falco\", pod=~\"falco.*\"} | json | __error__=\"\" | rule=~\"Local .*\" | line_format \"{{.time}} | {{.priority}} | rule={{.rule}} | ns={{.output_fields_k8s_ns_name}} | pod={{.output_fields_k8s_pod_name}} | {{.output}}\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Recent Local Guardrail Events",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["security", "falco", "guardrails"],
      "templating": {
        "list": [
          {
            "current": {"selected": true, "text": "Loki", "value": "Loki"},
            "hide": 0,
            "includeAll": false,
            "label": "Logs",
            "multi": false,
            "name": "logs",
            "options": [],
            "query": "loki",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {"from": "now-24h", "to": "now"},
      "timezone": "browser",
      "title": "Falco Local Guardrails",
      "version": 1
    }
