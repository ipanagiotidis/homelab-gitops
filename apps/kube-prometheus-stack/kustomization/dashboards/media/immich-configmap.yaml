              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "up{job=\"immich-server\",endpoint=\"metrics-ms\"}",
              "refId": "A"
            }
          ],
          "title": "Microservices Metrics Endpoint",
          "type": "stat"
