          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "histogram_quantile(0.95, sum by (le) (rate({job=\"immich-server\",endpoint=\"metrics-api\",__name__=~\".*(http|api).*(duration|latency|request).*(seconds_bucket|milliseconds_bucket|bucket)$\"}[5m]))) * 1000",
              "legendFormat": "API p95",
              "refId": "A"
            }
