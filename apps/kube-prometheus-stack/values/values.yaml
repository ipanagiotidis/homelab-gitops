alertmanager:
  enabled: false
kubeApiServer:
  enabled: true
kubelet:
  enabled: true
kubeControllerManager:
  enabled: false
coreDns:
  enabled: false
kubeDns:
  enabled: false
# kubeEtcd:
#   enabled: false
kubeScheduler:
  enabled: false
# kubeProxy:
#   enabled: false
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
grafana:
  assertNoLeakedSecrets: false
  defaultDashboardsEnabled: false
  initChownData:
    enabled: false
  image:
    registry: reg.yiannis.io
    repository: proxy-dockerhub/grafana/grafana
    # pinned to latest stable release tag: 12.4.2
    tag: 12.4.2
    sha: "83749231c3835e390a3144e5e940203e42b9589761f20ef3169c716e734ad505"
  ingress:
    enabled: false
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Grafana
      gethomepage.dev/href: "https://gfn.yiannis.io"
      gethomepage.dev/group: Monitoring
      gethomepage.dev/icon: grafana.png
      gethomepage.dev/name: grafana
      gethomepage.dev/pod-selector: ""
    hosts:
      - gfn.yiannis.io
  grafana.ini:
    auth:
      signout_redirect_url: "https://authentik.yiannis.io/application/o/grafana/end-session/"
      oauth_auto_login: true
      login_cookie_name: __Host-grafana_session
    server:
      root_url: https://gfn.yiannis.io/
      enforce_domain: true
    security:
      cookie_secure: true
      cookie_samesite: strict
      login_cookie_name: __Host-grafana_session
      strict_transport_security: true
    auth.generic_oauth:
      name: authentik
      enabled: true
      client_id: $__file{/etc/secrets/auth_generic_oauth/GRAFANA_CLIENT_ID}
      client_secret: $__file{/etc/secrets/auth_generic_oauth/GRAFANA_CLIENT_SECRET}
      scopes: "openid profile email"
      auth_url: "https://authentik.yiannis.io/application/o/authorize/"
      token_url: "https://authentik.yiannis.io/application/o/token/"
      api_url: "https://authentik.yiannis.io/application/o/userinfo/"
      # Optionally map user groups to Grafana roles
      role_attribute_path: contains(groups, 'Grafana Admins') && 'Admin' || contains(groups, 'Grafana Editors') && 'Editor' || contains(groups, 'Grafana Viewers') && 'Viewer'
  extraSecretMounts:
    - name: auth-generic-oauth-secret-mount
      secretName: grafana-client
      defaultMode: 0440
      mountPath: /etc/secrets/auth_generic_oauth
      readOnly: true
  persistence:
    enabled: true
    type: pvc
    size: 10Gi  # Adjust the size according to your needs
    storageClassName: "local-path"  # Specify your storage class
    accessModes:
      - ReadWriteOnce
    finalizers:
      - kubernetes.io/pvc-protection
  sidecar:
    image:
      registry: reg.yiannis.io
      repository: proxy-quay/kiwigrid/k8s-sidecar
      tag: 2.5.0@sha256:a6b3f707f883108376514489a94d6629109a327b2978e1d826cd104c4ca436df
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folderAnnotation: k8s-sidecar-target-directory
      provider:
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
kube-state-metrics:
  image:
    registry: reg.yiannis.io
    repository: proxy-k8s/kube-state-metrics/kube-state-metrics
    tag: v2.18.0@sha256:1545919b72e3ae035454fc054131e8d0f14b42ef6fc5b2ad5c751cafa6b2130e
prometheus-node-exporter:
  image:
    registry: reg.yiannis.io
    repository: proxy-quay/prometheus/node-exporter
    tag: v1.10.2
    digest: sha256:337ff1d356b68d39cef853e8c6345de11ce7556bb34cda8bd205bcf2ed30b565
prometheusOperator:
  image:
    registry: reg.yiannis.io
    repository: proxy-quay/prometheus-operator/prometheus-operator
    tag: v0.89.0
    sha: fea93ca9be807eee2f51f4d997b7a2bf073d4051d9012b45b3c84a7b9e8b3f25
  prometheusConfigReloader:
    image:
      registry: reg.yiannis.io
      repository: proxy-quay/prometheus-operator/prometheus-config-reloader
      tag: v0.89.0
      sha: cb4ac6a56555bef0e202bec11e367dfe07ffb241cf4d30566b12b864692607a8
  admissionWebhooks:
    patch:
      image:
        registry: reg.yiannis.io
        repository: proxy-ghcr/jkroepke/kube-webhook-certgen
        tag: 1.8.0
prometheus:
  prometheusSpec:
    image:
      registry: reg.yiannis.io
      repository: proxy-quay/prometheus/prometheus
      tag: v3.10.0
      sha: 7571a304e67fbd794be02422b13627dc7de822152f74e99e2bef95d29eceecde
    ruleSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    enableRemoteWriteReceiver: true
    enableOTLPReceiver: true
    nodeSelector:
      extraDiskNode: "true"
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi  # Sized for ~30d retention with headroom on current ingestion
          storageClassName: "local-path"  # Specify your storage class
    retention: "30d"
    retentionSize: "12GiB"
