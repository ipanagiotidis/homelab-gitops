updateStrategy:
  # -- Customize updateStrategy: RollingUpdate or OnDelete
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1

providers:
  kubernetesIngress:
    enabled: true
    allowExternalNameServices: true
    allowEmptyServices: false
    publishedService:
      enabled: true
  kubernetesGateway:
    enabled: true

gateway:
  enabled: false

gatewayClass:
  enabled: false

service:
  enabled: true
  type: LoadBalancer
  # -- Additional annotations applied to both TCP and UDP services (e.g. for cloud provider specific config)
  annotations: 
    metallb.universe.tf/ip-allocated-from-pool: single-lb-pool
  spec:
    externalTrafficPolicy: Cluster
    loadBalancerIP: "192.168.88.7"
  additionalServices:
    public:
      type: ClusterIP

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
  webpublic:
    port: 8001
    expose:
      public: true
    exposedPort: 80
  websecurepublic:
    port: 8444
    expose:
      public: true
    exposedPort: 443

tlsStore:
  default:
    defaultCertificate:
      secretName: traefik-wildcard-tls

ingressClass:
  enabled: true
  isDefaultClass: true
  name: "traefik"

securityContext:
  capabilities:
    drop: [ALL]
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

env:
  - name: TRAEFIK_ENTRYPOINTS_WEB_ADDRESS
    value: :80
  - name: TRAEFIK_ENTRYPOINTS_WEBSECURE_ADDRESS
    value: :443
  - name: TRAEFIK_ENTRYPOINTS_WEBPUBLIC_ADDRESS
    value: :8001
  - name: TRAEFIK_ENTRYPOINTS_WEBSECUREPUBLIC_ADDRESS
    value: :8444
  - name: TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_TO
    value: websecure
  - name: TRAEFIK_ENTRYPOINTS_WEB_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME
    value: https
  - name: TRAEFIK_ENTRYPOINTS_WEBPUBLIC_HTTP_REDIRECTIONS_ENTRYPOINT_TO
    value: websecurepublic
  - name: TRAEFIK_ENTRYPOINTS_WEBPUBLIC_HTTP_REDIRECTIONS_ENTRYPOINT_SCHEME
    value: https
  - name: TRAEFIK_ENTRYPOINTS_WEB_HTTP_MIDDLEWARES
    value: traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd
  - name: TRAEFIK_ENTRYPOINTS_WEBSECURE_HTTP_MIDDLEWARES
    value: traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd
  - name: TRAEFIK_ENTRYPOINTS_WEBPUBLIC_HTTP_MIDDLEWARES
    value: traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd
  - name: TRAEFIK_ENTRYPOINTS_WEBSECUREPUBLIC_HTTP_MIDDLEWARES
    value: traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd

logs:
  general:
    format: "json"
  access:
    enabled: true
    format: "json"
    fields:
      headers: 
        defaultmode: keep

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`tf.yiannis.io`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
    entryPoints: ["websecure"]
    annotations:
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Traefik
      gethomepage.dev/href: "https://tf.yiannis.io/dashboard/"
      gethomepage.dev/group: Ingress
      gethomepage.dev/icon: traefik.png
      gethomepage.dev/name: traefik
      gethomepage.dev/pod-selector: ""
      gethomepage.dev/widget.type: "traefik"
      gethomepage.dev/widget.url: "https://tf.yiannis.io"
    # middlewares:
    #   - name: authentik
    #     namespace: traefik
volumes:
  - name: crowdsec-bouncer-tls
    mountPath: /etc/traefik/crowdsec-certs/
    type: secret

experimental:
  plugins:
    bouncer:
      moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
      version: "v1.4.2"

additionalArguments:
  - "--experimental.plugins.bouncer.moduleName=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
  - "--experimental.plugins.bouncer.version=v1.4.2"
  - "--entrypoints.web.http.middlewares=traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd"
  - "--entrypoints.websecure.http.middlewares=traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd"
  - "--entrypoints.webpublic.http.middlewares=traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd"
  - "--entrypoints.websecurepublic.http.middlewares=traefik-redirect-http-https@kubernetescrd,traefik-bouncer@kubernetescrd"
  - "--providers.kubernetescrd"

metrics:
  prometheus:
    enabled: true
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true
    service:
      enabled: true
    serviceMonitor:
      enabled: true

