defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false

controllers:
  homepage-external:
    strategy: RollingUpdate
    revisionHistoryLimit: 2
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    containers:
      homepage:
        image:
          repository: reg.yiannis.io/proxy-ghcr/gethomepage/homepage
          tag: v1.12.3
          digest: sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
        env:
          HOMEPAGE_ALLOWED_HOSTS: dashboard.yiannis.io
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 250m
            memory: 128Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 5
              timeoutSeconds: 1
              failureThreshold: 30

configMaps:
  homepage-external:
    enabled: true
    forceRename: homepage-external
    data:
      bookmarks.yaml: ""
      docker.yaml: ""
      kubernetes.yaml: ""
      services.yaml: |
        - Platform:
          - argocd:
              description: ArgoCD
              href: https://argocd.yiannis.io
              icon: argo-cd.png
              name: argocd
          - authentik:
              description: Authentik
              href: https://authentik.yiannis.io
              icon: authentik.png
              name: authentik
          - gitea:
              description: Gitea
              href: https://gitea.yiannis.io/explore/repos
              icon: gitea.png
              name: gitea
        - Monitoring:
          - grafana:
              description: Grafana
              href: https://gfn.yiannis.io
              icon: grafana.png
              name: grafana
          - prometheus:
              description: Metrics and targets
              href: https://gfn.yiannis.io
              icon: prometheus.png
              name: prometheus
          - speedtest:
              description: WAN speed tracking
              href: https://speed.yiannis.io
              icon: mdi-speedometer
              name: Speedtest
        - Services:
          - paperless-ngx:
              description: Document Management
              href: https://docs.yiannis.io
              icon: paperless-ngx.png
              name: Paperless-ngx
        - Infrastructure:
          - adguard:
              description: Adguard
              href: https://adguard.yiannis.io
              icon: adguard-home.png
              name: adguard
          - truenas:
              description: NAS and storage status
              href: https://truenas.yiannis.io
              icon: truenas.png
              name: truenas
        - Ingress:
          - traefik:
              description: Traefik
              href: https://tf.yiannis.io/dashboard/
              icon: traefik.png
              name: traefik
        - Media:
          - immich:
              description: Immich
              href: https://photos.yiannis.io
              icon: immich.png
              name: Immich
          - jellyfin:
              description: Jellyfin
              href: https://jf.yiannis.io
              icon: jellyfin
              name: Jellyfin
          - jellyseerr:
              description: Request management
              href: https://demandeur.yiannis.io
              icon: jellyseerr.png
              name: Jellyseerr
          - prowlarr:
              description: Indexer manager
              href: https://prw.yiannis.io
              icon: prowlarr.png
              name: Prowlarr
          - qbittorrent:
              description: QBittorrent
              href: https://qb.yiannis.io
              icon: qbittorrent.png
              name: qbittorrent
          - radarr:
              description: Movie management
              href: https://rdr.yiannis.io
              icon: radarr.png
              name: Radarr
          - sonarr:
              description: Series management
              href: https://snr.yiannis.io
              icon: sonarr.png
              name: Sonarr
        - Personal:
          - engineering-blog:
              description: Engineering notes and software writing
              href: https://blog.yiannis.io
              icon: mdi-post-outline
              name: Engineering Blog
      settings.yaml: |
        title: Homepage Public
        headerStyle: boxed
        layout:
          Platform:
          Monitoring:
          Services:
          Infrastructure:
          Ingress:
          Media:
          Personal:
      widgets.yaml: ""

service:
  homepage-external:
    controller: homepage-external
    primary: true
    ports:
      http:
        port: 3000

ingress:
  homepage-external:
    enabled: true
    className: traefik
    hosts:
      - host: dashboard.yiannis.io
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: homepage-external
              port: http

persistence:
  base-config:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config

  homepage-config:
    enabled: true
    type: configMap
    identifier: homepage-external
    advancedMounts:
      homepage-external:
        homepage:
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
            readOnly: true
          - path: /app/config/docker.yaml
            subPath: docker.yaml
            readOnly: true
          - path: /app/config/kubernetes.yaml
            subPath: kubernetes.yaml
            readOnly: true
          - path: /app/config/services.yaml
            subPath: services.yaml
            readOnly: true
          - path: /app/config/settings.yaml
            subPath: settings.yaml
            readOnly: true
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
            readOnly: true

  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs

  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp
