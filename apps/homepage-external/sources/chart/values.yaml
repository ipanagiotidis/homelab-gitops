defaultPodOptions:
  automountServiceAccountToken: false
  enableServiceLinks: false

controllers:
  homepage-external:
    strategy: RollingUpdate
    revisionHistoryLimit: 2
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    containers:
      homepage:
        image:
          repository: reg.yiannis.io/proxy-ghcr/gethomepage/homepage
          tag: v1.12.3
          digest: sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.yiannis.io
        resources:
          requests:
            cpu: 10m
            memory: 10Mi
          limits:
            cpu: 250m
            memory: 128Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 5
              timeoutSeconds: 1
              failureThreshold: 30

configMaps:
  homepage-external:
    enabled: true
    forceRename: homepage-external
    data:
      bookmarks.yaml: ""
      docker.yaml: ""
      kubernetes.yaml: ""
      services.yaml: |
        - Monitoring:
          - prometheus:
              description: Metrics and targets
              href: https://gfn.yiannis.io
              icon: prometheus.png
              name: prometheus
        - Infrastructure:
          - adguard:
              description: Adguard
              href: https://adguard.yiannis.io
              icon: adguard-home.png
              name: adguard
          - truenas:
              description: NAS and storage status
              href: https://truenas.yiannis.io
              icon: truenas.png
              name: truenas
      settings.yaml: |
        title: Homepage
        headerStyle: boxed
        layout:
          Monitoring:
          Infrastructure:
      widgets.yaml: ""

service:
  homepage-external:
    controller: homepage-external
    primary: true
    ports:
      http:
        port: 3000

ingress:
  homepage-external:
    enabled: true
    className: traefik
    hosts:
      - host: home.yiannis.io
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: homepage-external
              port: http

persistence:
  base-config:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config

  homepage-config:
    enabled: true
    type: configMap
    identifier: homepage-external
    advancedMounts:
      homepage-external:
        homepage:
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
            readOnly: true
          - path: /app/config/docker.yaml
            subPath: docker.yaml
            readOnly: true
          - path: /app/config/kubernetes.yaml
            subPath: kubernetes.yaml
            readOnly: true
          - path: /app/config/services.yaml
            subPath: services.yaml
            readOnly: true
          - path: /app/config/settings.yaml
            subPath: settings.yaml
            readOnly: true
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
            readOnly: true

  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs

  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp
