apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: homepage-external
  namespace: argocd
  labels:
    app: homepage-external
spec:
  destination:
    namespace: homepage-external
    server: https://kubernetes.default.svc
  project: default
  sources:
  - path: apps/homepage-external/sources/chart
    repoURL: https://github.com/ipanagiotidis/homelab-gitops.git
    targetRevision: master
    helm:
      releaseName: homepage-external
  - repoURL: https://github.com/ipanagiotidis/homelab-gitops.git
    path: apps/homepage-external/kustomization
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - Validate=true
    - CreateNamespace=true
