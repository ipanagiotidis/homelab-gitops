apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarr-private
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Series management
    gethomepage.dev/href: "https://snr.yiannis.io"
    gethomepage.dev/group: Media
    gethomepage.dev/icon: sonarr.png
    gethomepage.dev/name: Sonarr
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "sonarr"
    gethomepage.dev/widget.url: "http://sonarr.media-video.svc.cluster.local:8989"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_SONARR}}"
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private
    namespace: traefik
    sectionName: websecure-snr
  hostnames:
  - snr.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: authentik
    backendRefs:
    - group: ""
      kind: Service
      name: sonarr
      port: 8989
      weight: 1
