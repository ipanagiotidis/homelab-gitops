# Configure options applied to all pods
defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  # Configure the main controller
  sonarr:

    # Configure the pod-specific securityContext
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault

    containers:
      # Configure the main application container
      sonarr:
        image:
          # -- image repository
          repository: reg.yiannis.io/proxy-dockerhub/linuxserver/sonarr
          # -- pinned to latest stable release tag: 4.0.17.2952-ls305
          digest: sha256:76414c033f290d3c9f1f9dfad71150abe71d92592369a3377a5903d579e6e2b2
        # Configure the container-specific securityContext
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
        # -- Configure the resource requests and/or limits for the Pod
        resources:
          requests:
          #   # Hardware acceleration using an Intel iGPU w/ QuickSync and
          #   # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
          #   gpu.intel.com/i915: 1
            cpu: 10m
            memory: 128Mi
          limits:
          #   # Hardware acceleration using an Intel iGPU w/ QuickSync and
          #   # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
          #  gpu.intel.com/i915: 1
            memory: 4096Mi


service:
  # Configure a service for the main application
  controller: sonarr
  sonarr:
    type: ClusterIP
    ports:
      http:
        port: 8989

ingress:
  # Configure an Ingress for the main application
  sonarr:
    enabled: false
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-authentik@kubernetescrd
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Series management
      gethomepage.dev/href: "https://snr.yiannis.io"
      gethomepage.dev/group: Media
      gethomepage.dev/icon: sonarr.png
      gethomepage.dev/name: Sonarr
      gethomepage.dev/pod-selector: ""
      gethomepage.dev/widget.type: "sonarr"
      gethomepage.dev/widget.url: "http://sonarr.media-video.svc.cluster.local:8989"
      gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_SONARR}}`}}'
    ingressClassName: "traefik"
    hosts:
      - host: "snr.yiannis.io"
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: sonarr
              port: http

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: truenas-apps
    accessMode: ReadWriteOnce
    size: 2Gi
    globalMounts:
      - path: /config

  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-video
    globalMounts:
      - path: /data
