apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: truenas-photos
provisioner: nfs.csi.k8s.io
allowVolumeExpansion: true
parameters:
  server: 192.168.88.110
  share: /mnt/DataPool/k8s/media/photos
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  - nfsvers=4.1
  - nconnect=8
  - rsize=1048576
  - wsize=1048576
  - hard
  - timeo=600
  - retrans=2
