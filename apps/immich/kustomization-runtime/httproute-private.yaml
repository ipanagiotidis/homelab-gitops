apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-private
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Immich
    gethomepage.dev/href: "https://photos.yiannis.io"
    gethomepage.dev/group: Media
    gethomepage.dev/icon: immich.png
    gethomepage.dev/name: Immich
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "immich"
    gethomepage.dev/widget.url: "http://immich-server.immich.svc.cluster.local:2283"
    gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_IMMICH}}`}}'
    gethomepage.dev/widget.version: "2"
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private
    namespace: traefik
    sectionName: websecure-photos
  hostnames:
  - photos.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: immich-server
      port: 2283
      weight: 1
