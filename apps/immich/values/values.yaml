image:
  tag: v2.4.1

env:
  DB_HOSTNAME: immich-database-rw
  DB_PORT: "5432"
  DB_USERNAME:
    valueFrom:
      secretKeyRef:
        name: immich-database-app
        key: username
  DB_DATABASE_NAME:
    valueFrom:
      secretKeyRef:
        name: immich-database-app
        key: dbname
  DB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: immich-database-app
        key: password

immich:
  metrics:
    enabled: true

  persistence:
    library:
      existingClaim: immich-library

  server:
    ingress:
      main:
        enabled: true
        ingressClassName: traefik
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Immich
          gethomepage.dev/href: "https://photos.yiannis.io"
          gethomepage.dev/group: Media
          gethomepage.dev/icon: immich.png
          gethomepage.dev/name: Immich
          gethomepage.dev/pod-selector: ""
        hosts:
          - host: photos.yiannis.io
            paths:
              - path: /
                pathType: Prefix

valkey:
  enabled: true
  primary:
    persistence:
      enabled: true
      storageClass: truenas-apps
      size: 2Gi
