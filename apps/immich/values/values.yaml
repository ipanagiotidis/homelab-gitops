defaultPodOptions:
  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    fsGroup: 1001
    fsGroupChangePolicy: OnRootMismatch

immich:
  metrics:
    enabled: true

  persistence:
    library:
      existingClaim: immich-library

server:
  controllers:
    main:
      containers:
        main:
          image:
            repository: reg.yiannis.io/proxy-ghcr/immich-app/immich-server
            # pinned to latest stable release tag: v2.7.5
            tag: v2.7.5
            digest: sha256:c15bff75068effb03f4355997d03dc7e0fc58720c2b54ad6f7f10d1bc57efaa5
          resources:
            requests:
              cpu: 2000m
              memory: 6Gi
          env:
            DB_HOSTNAME: immich-database-rw
            DB_PORT: "5432"
            DB_USERNAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: username
            DB_DATABASE_NAME:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: dbname
            DB_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: immich-database-app
                  key: password
  ingress:
    main:
      enabled: false
      ingressClassName: traefik
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: Immich
        gethomepage.dev/href: "https://photos.yiannis.io"
        gethomepage.dev/group: Media
        gethomepage.dev/icon: immich.png
        gethomepage.dev/name: Immich
        gethomepage.dev/pod-selector: ""
        gethomepage.dev/widget.type: "immich"
        gethomepage.dev/widget.url: "http://immich-server.immich.svc.cluster.local:2283"
        gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_IMMICH}}`}}'
        gethomepage.dev/widget.version: "2"
      hosts:
        - host: photos.yiannis.io
          paths:
            - path: /
              service:
                identifier: main
      tls: []

machine-learning:
  controllers:
    main:
      containers:
        main:
          image:
            repository: reg.yiannis.io/proxy-ghcr/immich-app/immich-machine-learning
            tag: v2.7.5
            digest: sha256:a2501141440f10516d329fdfba2c68082e19eb9ba6016c061ac80d23beadf7f3

valkey:
  enabled: true
  controllers:
    main:
      containers:
        main:
          image:
            repository: reg.yiannis.io/proxy-dockerhub/valkey/valkey
            tag: 9.1-alpine@sha256:355ae2c6c965769a0d9b9810711e6befd5b79fe676d1faa848247733ad6a4408
  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 2Gi
