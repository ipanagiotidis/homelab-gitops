apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: immich-private
spec:
  parentRefs:
  - name: private
    namespace: traefik
    sectionName: websecure-photos
  hostnames:
  - photos.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: immich-server
      port: 2283
