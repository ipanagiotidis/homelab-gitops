apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: radarr-private
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Movie management
    gethomepage.dev/href: "https://rdr.yiannis.io"
    gethomepage.dev/group: Media
    gethomepage.dev/icon: radarr.png
    gethomepage.dev/name: Radarr
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "radarr"
    gethomepage.dev/widget.url: "http://radarr.media-video.svc.cluster.local:7878"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_RADARR}}"
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private
    namespace: traefik
    sectionName: websecure-rdr
  hostnames:
  - rdr.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: authentik
    backendRefs:
    - group: ""
      kind: Service
      name: radarr
      port: 7878
      weight: 1
