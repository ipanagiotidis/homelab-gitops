apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  labels:
    app: alloy
spec:
  destination:
    namespace: monitoring
    server: https://kubernetes.default.svc
  project: default
  sources:
  - chart: alloy
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: 1.7.0
    helm:
      releaseName: alloy
      skipCrds: true
      valueFiles:
        - $values/apps/alloy/values/values.yaml
  - repoURL: https://github.com/ipanagiotidis/homelab-gitops.git
    targetRevision: master
    ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - Validate=true
    - CreateNamespace=true
    - ServerSideApply=true
