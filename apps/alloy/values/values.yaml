controller:
  type: deployment
  replicas: 1

image:
  registry: reg.yiannis.io
  repository: proxy-dockerhub/grafana/alloy
  tag: v1.15.1
  digest: sha256:1f40cf52adda8fab3e058f9347a5d165624ecb9fbc1527769cb744748961940d

configReloader:
  image:
    registry: reg.yiannis.io
    repository: proxy-quay/prometheus-operator/prometheus-config-reloader
    tag: v0.81.0
    digest: sha256:959d47672fbff2776a04ec62b8afcec89e8c036af84dc5fade50019dab212746
  resources:
    requests:
      cpu: 10m
      memory: 50Mi

global:
  podSecurityContext:
    fsGroup: 473
    seccompProfile:
      type: RuntimeDefault

alloy:
  enableReporting: false
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsGroup: 473
    runAsNonRoot: true
    runAsUser: 473
  resources:
    requests:
      cpu: 25m
      memory: 256Mi
  configMap:
    create: true
    content: |
      discovery.kubernetes "pod" {
        role = "pod"
      }

      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pod.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action = "replace"
          target_label = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action = "replace"
          target_label = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          action = "replace"
          target_label = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          action = "replace"
          target_label = "app"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_container_name"]
          action = "replace"
          target_label = "job"
          separator = "/"
          replacement = "$1"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_id"]
          action = "replace"
          target_label = "container_runtime"
          regex = `^(\\S+):\\/\\/.+$`
          replacement = "$1"
        }
      }

      loki.source.kubernetes "pod_logs" {
        targets    = discovery.relabel.pod_logs.output
        forward_to = [loki.process.pod_logs.receiver]
      }

      loki.process "pod_logs" {
        stage.static_labels {
          values = {
            cluster = "homelab",
          }
        }

        forward_to = [loki.write.default.receiver]
      }

      loki.source.kubernetes_events "cluster_events" {
        job_name   = "integrations/kubernetes/eventhandler"
        log_format = "logfmt"
        forward_to = [loki.process.cluster_events.receiver]
      }

      loki.process "cluster_events" {
        stage.static_labels {
          values = {
            cluster = "homelab",
          }
        }

        stage.labels {
          values = {
            kubernetes_cluster_events = "job",
          }
        }

        forward_to = [loki.write.default.receiver]
      }

      loki.write "default" {
        endpoint {
          url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

rbac:
  create: true

serviceAccount:
  create: true
