apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tailscale-router
spec:
  endpointSelector:
    matchLabels:
      app: tailscale-router
  ingress:
  - fromEntities:
    - host
    toPorts:
    - ports:
      - port: "9002"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: "*"
  - toEntities:
    - kube-apiserver
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
      - port: "6443"
        protocol: TCP
  - toEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
      - port: "6443"
        protocol: TCP
  - toServices:
    - k8sService:
        serviceName: kubernetes
        namespace: default
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  - toCIDR:
    - 10.96.0.1/32
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  - toCIDR:
    - 192.168.88.121/32
    toPorts:
    - ports:
      - port: "6443"
        protocol: TCP
  - toCIDR:
    - 192.168.88.6/32
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/name: traefik
        k8s:io.kubernetes.pod.namespace: traefik
    toPorts:
    - ports:
      - port: "8444"
        protocol: TCP
  - toCIDR:
    - 192.168.88.7/32
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        app.kubernetes.io/name: traefik
        k8s:io.kubernetes.pod.namespace: traefik
    toPorts:
    - ports:
      - port: "8443"
        protocol: TCP
  - toCIDR:
    - 192.168.88.246/32
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
  # Direct Tailscale peer paths use WireGuard over arbitrary UDP ports.
  # Keep TCP egress narrow, but allow UDP peer candidates so active devices
  # can upgrade from DERP relay to direct connections when NAT allows it.
  - toEntities:
    - world
    toPorts:
    - ports:
      - port: "1"
        endPort: 65535
        protocol: UDP
  - toCIDRSet:
    - cidr: 10.0.0.0/8
    - cidr: 100.64.0.0/10
    - cidr: 172.16.0.0/12
    - cidr: 192.168.0.0/16
    toPorts:
    - ports:
      - port: "1"
        endPort: 65535
        protocol: UDP
