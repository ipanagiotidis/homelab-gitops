apiVersion: apps/v1
kind: Deployment
metadata:
  name: tailscale-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tailscale-router
  template:
    metadata:
      labels:
        app: tailscale-router
    spec:
      serviceAccountName: tailscale
      containers:
        - name: tailscale
          # pinned to stable digest resolved on 2026-04-02; latest GitHub stable release was v1.96.4
          image: reg.yiannis.io/proxy-dockerhub/tailscale/tailscale@sha256:95e528798bebe75f39b10e74e7051cf51188ee615934f232ba7ad06a3390ffa1
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: TS_KUBE_SECRET
              value: tailscale-router-state
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_AUTH_ONCE
              value: "true"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_HOSTNAME
              value: homelab-k8s-router
            - name: TS_ROUTES
              value: 192.168.88.6/32,192.168.88.7/32,192.168.88.246/32
            - name: TS_EXTRA_ARGS
              value: --advertise-tags=tag:k8s-router --accept-routes=false --accept-dns=false
            - name: TS_ENABLE_HEALTH_CHECK
              value: "true"
            - name: TS_LOCAL_ADDR_PORT
              value: "0.0.0.0:9002"
            - name: TS_DEBUG_FIREWALL_MODE
              value: nftables
          resources:
            limits:
              squat.ai/tun: "1"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          startupProbe:
            httpGet:
              path: /healthz
              port: 9002
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9002
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9002
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
