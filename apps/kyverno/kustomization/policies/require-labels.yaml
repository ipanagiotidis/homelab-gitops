apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-standard-app-labels
  annotations:
    policies.kyverno.io/title: Require Standard App Labels
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Label
    policies.kyverno.io/description: >-
      Define and use labels that identify application workloads in a consistent way.
      This audit-only policy checks for the core standard Kubernetes app labels
      in the first targeted namespaces. The broader `app.kubernetes.io/part-of`
      label is useful too, but is intentionally not required in the first audit pass.
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
  - name: check-for-standard-labels
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - authentik
          - gitea
          - homepage
          - monitoring
          - paperless-ngx
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: app.kubernetes.io/name and app.kubernetes.io/instance are required.
      pattern:
        metadata:
          labels:
            app.kubernetes.io/name: '?*'
            app.kubernetes.io/instance: '?*'
