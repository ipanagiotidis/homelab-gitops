apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-runtime-hardening-enforce-selected
  annotations:
    policies.kyverno.io/title: Require Runtime Hardening For Selected Namespaces
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Enforce a stronger runtime hardening baseline only for namespaces that
      already comply consistently today: service account token automount
      disabled, RuntimeDefault seccomp, non-root execution at the pod level,
      no privilege escalation, and drop-all capabilities for workload
      containers.
spec:
  admission: true
  validationFailureAction: Enforce
  background: true
  emitWarning: false
  rules:
  - name: require-automount-token-disabled-selected
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - cloudflare
          - homepage-external
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Pods in this namespace must set automountServiceAccountToken to false.
      pattern:
        spec:
          automountServiceAccountToken: false
  - name: require-runtime-default-seccomp-selected
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - cloudflare
          - homepage-external
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Pods in this namespace must use RuntimeDefault seccomp.
      pattern:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
  - name: require-pod-run-as-non-root-selected
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - cloudflare
          - homepage-external
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Pods in this namespace must run as non-root.
      pattern:
        spec:
          securityContext:
            runAsNonRoot: true
  - name: require-no-privilege-escalation-selected
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - cloudflare
          - homepage-external
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Workload containers in this namespace must disable privilege escalation.
      foreach:
      - list: request.object.spec.containers
        pattern:
          securityContext:
            allowPrivilegeEscalation: false
  - name: require-drop-all-capabilities-selected
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - cloudflare
          - homepage-external
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Workload containers in this namespace must drop all Linux capabilities.
      foreach:
      - list: request.object.spec.containers
        pattern:
          securityContext:
            capabilities:
              drop:
              - ALL
