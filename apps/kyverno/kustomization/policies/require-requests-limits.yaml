apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/title: Require Limits and Requests
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Application workloads should set CPU and memory requests, and at least memory limits,
      to improve scheduling predictability and cluster safety. This audit-only policy checks
      the first targeted namespaces.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: validate-resources
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - authentik
          - gitea
          - homepage
          - monitoring
          - paperless-ngx
    validate:
      message: CPU and memory requests and memory limits are required for containers.
      pattern:
        spec:
          containers:
          - resources:
              requests:
                memory: '?*'
                cpu: '?*'
              limits:
                memory: '?*'
          =(initContainers):
          - resources:
              requests:
                memory: '?*'
                cpu: '?*'
              limits:
                memory: '?*'
          =(ephemeralContainers):
          - resources:
              requests:
                memory: '?*'
                cpu: '?*'
              limits:
                memory: '?*'
