apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-runtime-hardening-audit
  annotations:
    policies.kyverno.io/title: Require Runtime Hardening
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audit higher-risk application namespaces for a stronger pod hardening baseline:
      service account token automount disabled, RuntimeDefault seccomp, non-root
      execution, and no privilege escalation for workload containers.
spec:
  admission: true
  validationFailureAction: Audit
  background: true
  emitWarning: false
  rules:
  - name: require-automount-token-disabled
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - immich
          - media-video
          - paperless-ngx
          - speedtest
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Pods in this namespace should set automountServiceAccountToken to false.
      pattern:
        spec:
          automountServiceAccountToken: false
  - name: require-runtime-default-seccomp
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - immich
          - media-video
          - paperless-ngx
          - speedtest
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Pods in this namespace should use RuntimeDefault seccomp.
      pattern:
        spec:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
  - name: require-run-as-non-root
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - immich
          - media-video
          - paperless-ngx
          - speedtest
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Workload containers in this namespace should run as non-root.
      foreach:
      - list: request.object.spec.containers
        pattern:
          securityContext:
            runAsNonRoot: true
  - name: require-no-privilege-escalation
    match:
      any:
      - resources:
          kinds:
          - Pod
          namespaces:
          - immich
          - media-video
          - paperless-ngx
          - speedtest
    skipBackgroundRequests: true
    validate:
      allowExistingViolations: true
      message: Workload containers in this namespace should disable privilege escalation.
      foreach:
      - list: request.object.spec.containers
        pattern:
          securityContext:
            allowPrivilegeEscalation: false
