crds:
  migration:
    image:
      registry: reg.yiannis.io
      defaultRegistry: reg.yiannis.io
      repository: proxy-kyverno/kyverno/kyverno-cli
      tag: v1.17.1@sha256:3a7addf83897abae291361dfccbdf63cba5926c7795fe44e527883ae2237e4b8

config:
  webhooks:
    namespaceSelector:
      matchExpressions:
      - key: kubernetes.io/metadata.name
        operator: NotIn
        values:
        - kube-system
        - kyverno

  resourceFiltersExcludeNamespaces:
  - kyverno

features:
  policyReports:
    enabled: true
  backgroundScan:
    enabled: true
    backgroundScanInterval: 1h

test:
  image:
    registry: reg.yiannis.io
    repository: proxy-ghcr/kyverno/readiness-checker
    tag: v0.1.0@sha256:c54c0aa24d536f7a31ed854db4f2b2d6863b41d7d85725e21f80cd318c4e815b # v0.1.0

webhooksCleanup:
  image:
    registry: reg.yiannis.io
    repository: proxy-k8s/kubectl
    tag: v1.34.3@sha256:1c6309bd167feb49b2bc1605bce05973002872fd0d26a2e76499ed0c903ea3cf # v1.34.3

admissionController:
  initContainer:
    image:
      registry: reg.yiannis.io
      repository: proxy-kyverno/kyverno/kyvernopre
      tag: v1.17.1@sha256:13bb0430078d3e36cfa3a1c905d915fb7ad1a3a936fefa75092b6a480d2e2c2e # v1.17.1
  container:
    image:
      registry: reg.yiannis.io
      repository: proxy-kyverno/kyverno/kyverno
      tag: v1.17.1@sha256:f3138bcbd7314b1f66984cde24ea953dc300b36a3bf2f408ac2fe2897dcc40bf # v1.17.1
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 1m

backgroundController:
  image:
    registry: reg.yiannis.io
    repository: proxy-kyverno/kyverno/background-controller
    tag: v1.17.1@sha256:6d694a404b54368f5ad429f9341e2a9e4e17b8d83bd2ec74643cdaed845d6ea8 # v1.17.1
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 1m

cleanupController:
  image:
    registry: reg.yiannis.io
    repository: proxy-kyverno/kyverno/cleanup-controller
    tag: v1.17.1@sha256:8789cbf5a89cbc97240de9d07be44a504d76e937fa75a43b27cb891b3d2b01c6 # v1.17.1
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 1m

reportsController:
