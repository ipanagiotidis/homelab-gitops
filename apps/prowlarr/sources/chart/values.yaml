# Configure options applied to all pods
defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  # Configure the main controller
  prowlarr:

    # Configure the pod-specific securityContext
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault

    containers:
      # Configure the main application container
      prowlarr:
        image:
          # -- image repository
          repository: reg.yiannis.io/proxy-dockerhub/linuxserver/prowlarr
          # -- pinned to latest stable release tag: 2.3.0.5236-ls140
          digest: sha256:e50f3b188a7d1771b61f395c4203e35476bd3047683508740305e830e15bacf7
        # Configure the container-specific securityContext
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
        # -- Configure the resource requests and/or limits for the Pod
        resources:
          requests:
          #   # Hardware acceleration using an Intel iGPU w/ QuickSync and
          #   # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
          #   gpu.intel.com/i915: 1
            cpu: 200m
            memory: 256Mi
          limits:
          #   # Hardware acceleration using an Intel iGPU w/ QuickSync and
          #   # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
          #  gpu.intel.com/i915: 1
            memory: 4096Mi


service:
  # Configure a service for the main application
  controller: prowlarr
  prowlarr:
    type: ClusterIP
    ports:
      http:
        port: 9696

ingress:
  # Configure an Ingress for the main application
  prowlarr:
    enabled: false
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-authentik@kubernetescrd
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Indexer manager
      gethomepage.dev/href: "https://prw.yiannis.io"
      gethomepage.dev/group: Media
      gethomepage.dev/icon: prowlarr.png
      gethomepage.dev/name: Prowlarr
      gethomepage.dev/pod-selector: ""
      gethomepage.dev/widget.type: "prowlarr"
      gethomepage.dev/widget.url: "http://prowlarr.media-video.svc.cluster.local:9696"
      gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_PROWLARR}}`}}'
    ingressClassName: "traefik"
    hosts:
      - host: "prw.yiannis.io"
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: prowlarr
              port: http

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: truenas-apps
    accessMode: ReadWriteOnce
    size: 2Gi
    advancedMounts:
      prowlarr:
        prowlarr:
          - path: /config
