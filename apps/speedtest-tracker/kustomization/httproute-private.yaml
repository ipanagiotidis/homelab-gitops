apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: speedtest-private
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: WAN speed tracking
    gethomepage.dev/group: Monitoring
    gethomepage.dev/href: "https://speed.yiannis.io"
    gethomepage.dev/icon: mdi-speedometer
    gethomepage.dev/name: Speedtest
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "speedtest"
    gethomepage.dev/widget.url: "http://speedtest-tracker.speedtest.svc.cluster.local"
    gethomepage.dev/widget.version: "2"
    gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_SPEEDTEST}}`}}'
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private
    namespace: traefik
    sectionName: websecure-speed
  hostnames:
  - speed.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: authentik
    backendRefs:
    - group: ""
      kind: Service
      name: speedtest-tracker
      port: 80
      weight: 1
