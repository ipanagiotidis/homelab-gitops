defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  speedtest-tracker:
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    initContainers:
      fix-config-permissions:
        image:
          repository: reg.yiannis.io/proxy-dockerhub/library/busybox
          tag: "1.28@sha256:141c253bc4c3fd0a201d32dc1f493bcf3fff003b6df416dea4f41046e0f37d47"
        command:
          - /bin/sh
          - -c
          - |
            mkdir -p /config/keys /config/log/php /config/log/nginx /config/www
            chown -R 1000:1000 /config
            chmod -R u+rwX,g+rwX /config
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
    containers:
      speedtest-tracker:
        image:
          repository: reg.yiannis.io/proxy-lscr/linuxserver/speedtest-tracker
          # pinned to latest stable release tag: v1.14.0-ls146
          digest: sha256:e119c2ace7661a14186f6c58d3a8777035456c764f836f00736359dd4cb88524
        env:
          PUID: "1000"
          PGID: "1000"
          TZ: "Europe/Zurich"
          APP_NAME: "Speedtest Tracker"
          APP_URL: "https://speed.yiannis.io"
          ASSET_URL: "https://speed.yiannis.io"
          DISPLAY_TIMEZONE: "Europe/Zurich"
          DB_CONNECTION: sqlite
          SPEEDTEST_SCHEDULE: "17 */4 * * *"
          PRUNE_RESULTS_OLDER_THAN: "90"
          APP_KEY:
            valueFrom:
              secretKeyRef:
                name: speedtest-tracker-secret
                key: app-key
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
            add:
              - CHOWN
              - SETGID
              - SETUID
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 80
              periodSeconds: 15
              timeoutSeconds: 3
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 80
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthcheck
                port: 80
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 30

service:
  controller: speedtest-tracker
  speedtest-tracker:
    type: ClusterIP
    ports:
      http:
        port: 80

ingress:
  speedtest-tracker:
    enabled: false
    ingressClassName: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-authentik@kubernetescrd
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: WAN speed tracking
      gethomepage.dev/group: Monitoring
      gethomepage.dev/href: "https://speed.yiannis.io"
      gethomepage.dev/icon: mdi-speedometer
      gethomepage.dev/name: Speedtest
      gethomepage.dev/pod-selector: ""
      gethomepage.dev/widget.type: "speedtest"
      gethomepage.dev/widget.url: "http://speedtest-tracker.speedtest.svc.cluster.local"
      gethomepage.dev/widget.version: "2"
      gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_SPEEDTEST}}`}}'
    hosts:
      - host: speed.yiannis.io
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: speedtest-tracker
              port: http

persistence:
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: local-path
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /config
