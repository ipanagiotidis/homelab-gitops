      - port: "8001"
        protocol: TCP
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
      - port: "8001"
        protocol: TCP
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
      rules:
        dns:
        - matchPattern: "*"
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        cnpg.io/cluster: harbor-database
    toPorts:
    - ports:
      - port: "5432"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: redis
    toPorts:
    - ports:
      - port: "6379"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: trivy
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: trivy
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: jobservice
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: registry
    toPorts:
    - ports:
      - port: "5000"
        protocol: TCP
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: portal
    toPorts:
    - ports:
      - port: "80"
        protocol: TCP
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: harbor
        app.kubernetes.io/name: harbor
        app.kubernetes.io/component: trivy
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: traefik
        app.kubernetes.io/name: traefik
    toPorts:
    - ports:
      - port: "8443"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: authentik
        app.kubernetes.io/name: authentik
        app.kubernetes.io/instance: authentik
        app.kubernetes.io/component: server
    toPorts:
    - ports:
      - port: "9000"
        protocol: TCP
      - port: "9443"
        protocol: TCP
  - toFQDNs:
    - matchName: auth.docker.io
    - matchName: docker.gitea.com
    - matchName: ghcr.io
    - matchName: lscr.io
    - matchName: reg.kyverno.io
    - matchName: registry-1.docker.io
    - matchName: registry.k8s.io
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
---
