apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  labels:
    app: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  destination:
    namespace: harbor
    server: https://kubernetes.default.svc
  project: default
  sources:
  - chart: harbor
    repoURL: https://helm.goharbor.io
    targetRevision: 1.19.0
    helm:
      releaseName: harbor
      valueFiles:
      - $values/apps/harbor/values/values.yaml
  - repoURL: https://github.com/ipanagiotidis/homelab-gitops.git
    targetRevision: master
    ref: values
  - repoURL: https://github.com/ipanagiotidis/homelab-gitops.git
    path: apps/harbor/kustomization
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - Validate=true
    - CreateNamespace=true
    - ServerSideApply=true
