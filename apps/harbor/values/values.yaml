expose:
  type: ingress
  tls:
    enabled: true
    certSource: none
  ingress:
    className: traefik
    hosts:
      core: reg.yiannis.io
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure

externalURL: https://reg.yiannis.io

existingSecretAdminPassword: harbor-secrets
existingSecretSecretKey: harbor-secrets

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      storageClass: truenas-apps
      size: 20Gi
    jobservice:
      jobLog:
        storageClass: local-path
        size: 1Gi
    redis:
      storageClass: local-path
      size: 1Gi
  imageChartStorage:
    type: filesystem
    filesystem:
      rootdirectory: /storage

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 1m

portal:
  resources:
    requests:
      cpu: 10m
      memory: 96Mi
    limits:
      memory: 192Mi

core:
  existingSecret: harbor-secrets
  secretName: harbor-secrets
  existingXsrfSecret: harbor-secrets
  resources:
    requests:
      cpu: 75m
      memory: 192Mi
    limits:
      memory: 384Mi

jobservice:
  existingSecret: harbor-secrets
  resources:
    requests:
      cpu: 25m
      memory: 192Mi
    limits:
      memory: 384Mi

registry:
  existingSecret: harbor-secrets
  registry:
    resources:
      requests:
        cpu: 75m
        memory: 192Mi
      limits:
        memory: 384Mi
  controller:
    resources:
      requests:
        cpu: 25m
        memory: 96Mi
      limits:
        memory: 192Mi
  credentials:
    existingSecret: harbor-secrets

trivy:
  enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi

database:
  type: external
  external:
    host: harbor-database-rw
    port: "5432"
    username: harbor
    coreDatabase: registry
    existingSecret: harbor-cnpg-app
    sslmode: disable

redis:
  internal:
    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        memory: 128Mi

exporter:
  resources:
    requests:
      cpu: 10m
      memory: 48Mi
    limits:
      memory: 96Mi
