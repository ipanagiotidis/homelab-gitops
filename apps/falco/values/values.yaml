image:
  registry: reg.yiannis.io
  repository: proxy-dockerhub/falcosecurity/falco
  tag: 0.43.1@sha256:b4166a61f41e2fa638c041cac881d8bb32c284e3aaf282fdfed80f15f6eb55e3

driver:
  kind: modern_ebpf
tty: true

collectors:
  containerEngine:
    pluginRef: ghcr.io/falcosecurity/plugins/plugin/container:0.6.3

# Keep phase-1 Falco lightweight enough to fit the smaller nodes while we tune
# the runtime-only profile. Requests are what blocked scheduling.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

# Phase 1: start with Falco runtime/syscall detection only and keep the signal
# intentionally narrow. Incubating rules, k8s audit rules, and rule auto-follow
# created too much churn/noise for a first useful rollout.
falcosidekick:
  enabled: false

customRules:
  local-platform-tuning.yaml: |-
    # First-pass noise reduction: keep the default Falco rule, but carve out the
    # very repetitive Talos/Cilium CNI runtime binaries that are not actionable
    # for this homelab. The rest of the rule still fires unchanged.
    - macro: local_platform_runtime_cni_exec
      condition: >
        container.id=runtime
        and proc.pname=containerd
        and proc.exepath in (/opt/cni/bin/loopback, /opt/cni/bin/cilium-cni)

    # FlareSolverr launches chromedriver from /app as part of its normal
    # challenge-solving flow. Keep the "new binary in container" rule globally,
    # but ignore this one expected app-specific runtime pattern.
    - macro: local_expected_flaresolverr_chromedriver_exec
      condition: >
        k8s.ns.name=media-video
        and container.image.repository=reg.yiannis.io/proxy-dockerhub/flaresolverr/flaresolverr
        and proc.exepath=/app/chromedriver
        and proc.pname=python

    - rule: Drop and execute new binary in container
      condition: and not local_platform_runtime_cni_exec and not local_expected_flaresolverr_chromedriver_exec
      override:
        condition: append
  local-runtime-guardrails.yaml: |-
    # Broader, practical runtime guardrails for this homelab. These focus on
    # post-exploit activity that is unusual in application containers without
    # enabling whole extra upstream rulesets.
    - list: local_restricted_namespaces
      items: [authentik, cloudflare, crowdsec, external-secrets, falco, gitea, homepage, homepage-external, media-video, monitoring, paperless-ngx, speedtest, tailscale, traefik]

    - list: local_shell_binaries
      items: [sh, ash, bash, dash, zsh]

    - list: local_download_tool_binaries
      items: [curl, wget, nc, ncat, netcat, socat, ftp, tftp]

    - list: local_package_manager_binaries
      items: [apt, apt-get, apk, dnf, microdnf, yum, pip, pip3, npm, yarn]

    - macro: local_restricted_ns_container
      condition: container and k8s.ns.name in (local_restricted_namespaces)

    - macro: local_exec_from_tmp_or_shm
      condition: >
        proc.exepath startswith /tmp/
        or proc.exepath startswith /var/tmp/
        or proc.exepath startswith /dev/shm/

    - macro: local_expected_healthcheck_shell
      condition: >
        (k8s.ns.name=authentik and proc.cmdline startswith "bash /lifecycle/ak healthcheck")
        or (k8s.ns.name=gitea and proc.cmdline startswith "sh -c /scripts/ping_readiness_local.sh")
        or (k8s.ns.name=gitea and proc.cmdline startswith "sh -c /scripts/ping_liveness_local.sh")
        or (k8s.ns.name=speedtest and proc.cmdline startswith "sh -c /usr/bin/php /app/www/artisan schedule:run -q")
        or (proc.cmdline startswith "sh -c -- /controller/manager wal-archive --log-destination /controller/log/postgres.json")
        or (k8s.ns.name=speedtest and proc.cmdline startswith "sh -c run-parts /etc/periodic/")
        or (k8s.ns.name=media-video and proc.cmdline icontains "/usr/bin/xkbcomp")

    - rule: Local Exec From Suspicious Writable Path
      desc: Detect execution of binaries from /tmp, /var/tmp, or /dev/shm inside containers.
      condition: spawned_process and container and local_exec_from_tmp_or_shm
      output: >
        Executable started from suspicious writable path (user=%user.name k8s_ns=%k8s.ns.name
        k8s_pod=%k8s.pod.name container=%container.name image=%container.image.repository
        proc=%proc.name exepath=%proc.exepath cmdline=%proc.cmdline parent=%proc.pname)
      priority: ERROR
      tags: [maturity_stable, mitre_execution, container, process]

    - rule: Local Download Tool Executed In Restricted Namespace
      desc: Detect download and remote-access tooling in namespaces where it is unusual.
      condition: >
        spawned_process
        and local_restricted_ns_container
        and proc.name in (local_download_tool_binaries)
      output: >
        Download or remote-access tool executed in restricted namespace (user=%user.name
        k8s_ns=%k8s.ns.name k8s_pod=%k8s.pod.name container=%container.name
        proc=%proc.name exepath=%proc.exepath cmdline=%proc.cmdline parent=%proc.pname)
      priority: WARNING
      tags: [maturity_stable, mitre_execution, container, process]

    - rule: Local Package Manager Executed In Container
      desc: Detect package manager execution inside containers.
      condition: spawned_process and container and proc.name in (local_package_manager_binaries)
      output: >
        Package manager executed in container (user=%user.name k8s_ns=%k8s.ns.name
        k8s_pod=%k8s.pod.name container=%container.name proc=%proc.name
        exepath=%proc.exepath cmdline=%proc.cmdline parent=%proc.pname)
      priority: WARNING
      tags: [maturity_stable, mitre_execution, container, process]

    - rule: Local Shell Spawned In Restricted Namespace
      desc: Detect shell execution in namespaces where interactive shell activity is unusual.
      condition: >
        spawned_process
        and local_restricted_ns_container
        and proc.name in (local_shell_binaries)
        and proc.pname exists
        and not proc.pname in (local_shell_binaries)
        and not local_expected_healthcheck_shell
      output: >
        Shell spawned in restricted namespace (user=%user.name k8s_ns=%k8s.ns.name
        k8s_pod=%k8s.pod.name container=%container.name proc=%proc.name
        exepath=%proc.exepath cmdline=%proc.cmdline parent=%proc.pname)
      priority: WARNING
      tags: [maturity_stable, mitre_execution, container, process]

falcoctl:
  image:
    registry: reg.yiannis.io
    repository: proxy-dockerhub/falcosecurity/falcoctl
    tag: 0.12.2@sha256:0d3bddce03a26365b86e6ff1aa5c51965d2e16569e8cf8b3e37a3d3ef186dc9b
  artifact:
    install:
      enabled: true
    follow:
      enabled: false
  config:
    indexes:
      - name: falcosecurity
        url: https://falcosecurity.github.io/falcoctl/index.yaml
    artifact:
      install:
        resolveDeps: true
        refs: ["falco-rules:5"]
      follow:
        refs: ["falco-rules:5"]

metrics:
  enabled: true

serviceMonitor:
  create: true

falco:
  priority: warning
  json_output: true
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/rules.d
