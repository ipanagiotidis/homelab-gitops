driver:
  kind: modern_ebpf
tty: true

# Phase 1: start with Falco runtime/syscall detection only and keep the signal
# intentionally narrow. Incubating rules, k8s audit rules, and rule auto-follow
# created too much churn/noise for a first useful rollout.
falcosidekick:
  enabled: false

falcoctl:
  artifact:
    install:
      enabled: true
    follow:
      enabled: false
  config:
    artifact:
      install:
        refs: [falco-rules:5]
      follow:
        refs: [falco-rules:5]

metrics:
  enabled: true

serviceMonitor:
  create: true

falco:
  priority: warning
  json_output: true
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/rules.d
