image:
  registry: reg.yiannis.io
  repository: proxy-dockerhub/falcosecurity/falco
  tag: 0.43.1@sha256:b4166a61f41e2fa638c041cac881d8bb32c284e3aaf282fdfed80f15f6eb55e3

driver:
  kind: modern_ebpf
tty: true

collectors:
  containerEngine:
    pluginRef: reg.yiannis.io/proxy-ghcr/falcosecurity/plugins/plugin/container:0.6.3

# Keep phase-1 Falco lightweight enough to fit the smaller nodes while we tune
# the runtime-only profile. Requests are what blocked scheduling.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

# Phase 1: start with Falco runtime/syscall detection only and keep the signal
# intentionally narrow. Incubating rules, k8s audit rules, and rule auto-follow
# created too much churn/noise for a first useful rollout.
falcosidekick:
  enabled: false

customRules:
  local-platform-tuning.yaml: |-
    # First-pass noise reduction: keep the default Falco rule, but carve out the
    # very repetitive Talos/Cilium CNI runtime binaries that are not actionable
    # for this homelab. The rest of the rule still fires unchanged.
    - macro: local_platform_runtime_cni_exec
      condition: >
        container.id=runtime
        and proc.pname=containerd
        and proc.exepath in (/opt/cni/bin/loopback, /opt/cni/bin/cilium-cni)

    # FlareSolverr launches chromedriver from /app as part of its normal
    # challenge-solving flow. Keep the "new binary in container" rule globally,
    # but ignore this one expected app-specific runtime pattern.
    - macro: local_expected_flaresolverr_chromedriver_exec
      condition: >
        k8s.ns.name=media-video
        and container.image.repository=reg.yiannis.io/proxy-dockerhub/flaresolverr/flaresolverr
        and proc.exepath=/app/chromedriver
        and proc.pname=python

    - rule: Drop and execute new binary in container
      condition: and not local_platform_runtime_cni_exec and not local_expected_flaresolverr_chromedriver_exec
      override:
        condition: append

falcoctl:
  image:
    registry: reg.yiannis.io
    repository: proxy-dockerhub/falcosecurity/falcoctl
    tag: 0.12.2@sha256:0d3bddce03a26365b86e6ff1aa5c51965d2e16569e8cf8b3e37a3d3ef186dc9b
  artifact:
    install:
      enabled: true
    follow:
      enabled: false
  config:
    indexes: []
    artifact:
      install:
        resolveDeps: false
        refs:
          - "reg.yiannis.io/proxy-ghcr/falcosecurity/rules/falco-rules:5"
          - "reg.yiannis.io/proxy-ghcr/falcosecurity/plugins/plugin/container:0.6.3"
      follow:
        refs:
          - "reg.yiannis.io/proxy-ghcr/falcosecurity/rules/falco-rules:5"
          - "reg.yiannis.io/proxy-ghcr/falcosecurity/plugins/plugin/container:0.6.3"

metrics:
  enabled: true

serviceMonitor:
  create: true

falco:
  priority: warning
  json_output: true
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/rules.d
