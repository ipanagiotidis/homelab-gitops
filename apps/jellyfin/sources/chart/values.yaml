# Configure options applied to all pods
defaultPodOptions:
  automountServiceAccountToken: false

controllers:
  # Configure the main controller
  jellyfin:

    # Configure the pod-specific securityContext
    pod:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"

    containers:
      # Configure the main application container
      jellyfin:
        image:
          # -- image repository
          repository: reg.yiannis.io/proxy-dockerhub/jellyfin/jellyfin
          # -- pinned to latest stable release tag: 10.11.7
          digest: sha256:17285f9cce63b3519ccad82b84497fc22482c20f8b8bbe0580d51fec5deaa6fd
        # Configure the container-specific securityContext
        securityContext:
          runAsUser: 1001
          runAsGroup: 1001
        # -- Configure the resource requests and/or limits for the Pod
        resources:
          requests:
          #   # Hardware acceleration using an Intel iGPU w/ QuickSync and
          #   # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
          #   gpu.intel.com/i915: 1
            cpu: 200m
            memory: 256Mi
          limits:
          #   # Hardware acceleration using an Intel iGPU w/ QuickSync and
          #   # using intel-gpu-plugin (https://github.com/intel/intel-device-plugins-for-kubernetes)
          #  gpu.intel.com/i915: 1
            memory: 4096Mi


service:
  # Configure a service for the main application
  controller: jellyfin
  jellyfin:
    type: ClusterIP
    ports:
      http:
        port: 8096

ingress:
  # Configure an Ingress for the main application
  jellyfin:
    enabled: true
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-jellyfin-forwarded-headers@kubernetescrd
      gethomepage.dev/enabled: "true"
      gethomepage.dev/description: Jellyfin
      gethomepage.dev/href: "https://jf.yiannis.io"
      gethomepage.dev/group: Media
      gethomepage.dev/icon: jellyfin
      gethomepage.dev/name: Jellyfin
      #gethomepage.dev/widget.type: "jellyfin"
      #gethomepage.dev/widget.url: "https://jf.yiannis.io"
      gethomepage.dev/pod-selector: ""
      gethomepage.dev/widget.type: "jellyfin"
      gethomepage.dev/widget.url: "http://jellyfin.media-video.svc.cluster.local:8096"
      gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_JF}}`}}'
      gethomepage.dev/enableBlocks: "true" # optional, defaults to false
      gethomepage.dev/enableNowPlaying: "true" # optional, defaults to true
      gethomepage.dev/enableUser: "true" # optional, defaults to false
      gethomepage.dev/showEpisodeNumber: "true" # optional, defaults to false
      gethomepage.dev/expandOneStreamToTwoRows: "false" # optional, defaults to true
    ingressClassName: "traefik"
    hosts:
      - host: "jf.yiannis.io"
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: jellyfin
              port: http

persistence:
  # Configure the main configuration storage location
  # config:
  #   enabled: true
  #   type: nfs
  #   server: 192.168.88.10
  #   path: /media/jellyfin/jellyfin/config
  #   advancedMounts:
  #     jellyfin:
  #       jellyfin:
  #         - path: /config
  # cache:
  #   enabled: true
  #   type: nfs
  #   server: 192.168.88.10
  #   path: /media/jellyfin/jellyfin/cache
  #   advancedMounts:
  #     jellyfin:
  #       jellyfin:
  #         - path: /cache
  # media:
  #   enabled: true
  #   type: nfs
  #   server: 192.168.88.10
  #   path: /media/jellyfin/jellyfin/downloads
  #   advancedMounts:
  #     jellyfin:
  #       jellyfin:
  #         - path: /media
  config:
    enabled: true
    type: persistentVolumeClaim
    storageClass: truenas-apps
    accessMode: ReadWriteOnce
    size: 5Gi
    globalMounts:
      - path: /config

  media:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: media-video
    globalMounts:
      - path: /media

  cache:
    enabled: true
    type: persistentVolumeClaim
    storageClass: local-path   # or whatever your local SC is called
    accessMode: ReadWriteOnce
    size: 20Gi
    globalMounts:
      - path: /cache
