---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://argocd.yiannis.io
  admin.enabled: "false"
  accounts.homepage: apiKey
  resource.customizations.health.postgresql.cnpg.io_Cluster: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.conditions ~= nil then
        for _, c in ipairs(obj.status.conditions) do
          if c.type == "Ready" and c.status == "True" then
            hs.status = "Healthy"
            hs.message = c.message or "Ready"
            return hs
          end
        end
      end

      if obj.status.readyInstances ~= nil and obj.spec ~= nil and obj.spec.instances ~= nil then
        if tonumber(obj.status.readyInstances) == tonumber(obj.spec.instances) then
          hs.status = "Healthy"
          hs.message = obj.status.phase or "All instances ready"
          return hs
        end
      end

      if obj.status.phase ~= nil then
        hs.status = "Progressing"
        hs.message = obj.status.phase
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for CloudNativePG status"
    return hs
  dex.config: |
    connectors:
    - config:
        issuer: https://authentik.yiannis.io/application/o/argocd/
        clientID: qXAitOkMZQKx4rpAxHcHroIX3Wdn4phUjO6sj9if
        clientSecret: $dex.authentik.clientSecret
        insecureEnableGroups: true
        scopes:
          - openid
          - profile
          - email
      name: authentik
      type: oidc
      id: authentik
