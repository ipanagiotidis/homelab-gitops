---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://argocd.yiannis.io
  admin.enabled: "false"
  accounts.homepage: apiKey
  resource.customizations.health.postgresql.cnpg.io_Cluster: |
    hs = {}
    if obj.status ~= nil then
      if obj.status.phase ~= nil then
        if obj.status.phase == "Cluster in healthy state" then
          hs.status = "Healthy"
          hs.message = obj.status.phase
          return hs
        end
        hs.status = "Progressing"
        hs.message = obj.status.phase
        return hs
      end
    end
    hs.status = "Progressing"
    hs.message = "Waiting for CloudNativePG status"
    return hs
  dex.config: |
    connectors:
    - config:
        issuer: https://authentik.yiannis.io/application/o/argocd/
        clientID: qXAitOkMZQKx4rpAxHcHroIX3Wdn4phUjO6sj9if
        clientSecret: $dex.authentik.clientSecret
        insecureEnableGroups: true
        scopes:
          - openid
          - profile
          - email
      name: authentik
      type: oidc
      id: authentik
