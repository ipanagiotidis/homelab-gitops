apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-https
  namespace: argocd
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: ArgoCD
    gethomepage.dev/href: "https://argocd.yiannis.io"
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: argo-cd.png
    gethomepage.dev/name: argocd
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "argocd"
    gethomepage.dev/widget.url: "http://argocd-server.argocd.svc.cluster.local"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_ARGOCD_READONLY}}"
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private
    namespace: traefik
    sectionName: websecure-argocd
  hostnames:
  - argocd.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
      headers:
      - name: Content-Type
        value: application/grpc
    backendRefs:
    - group: traefik.io
      kind: TraefikService
      name: argocd-server-h2c
      port: 80
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 80
      weight: 1
