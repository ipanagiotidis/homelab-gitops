apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: argocd-grpc
  namespace: argocd
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: private
    namespace: traefik
    sectionName: websecure-argocd-grpc
  hostnames:
  - argocd-grpc.yiannis.io
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: argocd-server
      port: 443
      weight: 1
