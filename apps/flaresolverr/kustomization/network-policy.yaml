apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flaresolverr-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: prowlarr
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: radarr
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: sonarr
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: jellyseerr
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flaresolverr-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: flaresolverr
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 10.96.0.0/12
        - 10.245.0.0/16
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
