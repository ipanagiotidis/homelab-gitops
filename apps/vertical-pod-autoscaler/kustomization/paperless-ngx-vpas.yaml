apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: paperless-ngx
  namespace: paperless-ngx
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paperless-ngx
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsOnly
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: paperless-ngx-redis
  namespace: paperless-ngx
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paperless-ngx-redis
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsOnly
