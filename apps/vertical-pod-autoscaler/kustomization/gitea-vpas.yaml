apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gitea
  namespace: gitea
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gitea
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsOnly
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gitea-valkey-cluster
  namespace: gitea
spec:
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: gitea-valkey-cluster
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
    - containerName: '*'
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsOnly
