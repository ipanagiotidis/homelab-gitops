excludeNamespaces: kube-system,kyverno,trivy-system

automountServiceAccountToken: true

image:
  registry: reg.yiannis.io
  repository: proxy-dockerhub/aquasec/trivy-operator
  tag: 0.30.1@sha256:448484ece65e26f1c7237c8d20dab997f5a8319968286a09e188140b863cf1f9 # 0.30.1

operator:
  scannerReportTTL: 168h
  vulnerabilityScannerEnabled: true
  configAuditScannerEnabled: true
  rbacAssessmentScannerEnabled: false
  infraAssessmentScannerEnabled: false
  clusterComplianceEnabled: false
  exposedSecretScannerEnabled: false
  metricsFindingsEnabled: true

serviceMonitor:
  enabled: true
  namespace: monitoring
  interval: 15m

policiesBundle:
