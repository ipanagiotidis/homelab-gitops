  repository: proxy-dockerhub/aquasec/trivy-checks
  tag: 1@sha256:0491169789b867ae5a7353381220c1d4d97b3a0d6d9dfd84a25d06f0ba68aa93 # 1

trivy:
  severity: HIGH,CRITICAL
  ignoreUnfixed: true
  slow: true
  image:
    registry: reg.yiannis.io
    repository: proxy-dockerhub/aquasec/trivy
    tag: 0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c # 0.69.3
