common:
  controllers:
    paperless-ngx:
      pod:
        securityContext:
          fsGroup: 3000
          fsGroupChangePolicy: OnRootMismatch
          supplementalGroups:
            - 3000
      containers:
        app:
          image:
            repository: ghcr.io/paperless-ngx/paperless-ngx
            tag: "2.20.13"
            # -- pinned to latest stable release tag: 2.20.13
            digest: sha256:4b05bcd28e6923768000b5d247cbf2c66fd49bdc3f3b05955bd4f6790a638b01
          env:
            PAPERLESS_URL: "https://docs.yiannis.io"
            PAPERLESS_PORT: "8000"
            PAPERLESS_TIME_ZONE: "Europe/Athens"
            PAPERLESS_OCR_LANGUAGE: "eng"
            PAPERLESS_FILENAME_FORMAT: '{{`{{ created_year }}/{{ correspondent }}/{{ created }} {{ title }}`}}'
            PAPERLESS_FILENAME_FORMAT_REMOVE_NONE: "true"
            PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
            PAPERLESS_DISABLE_REGULAR_LOGIN: "true"
            PAPERLESS_LOGOUT_REDIRECT_URL:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: oidc_logout_redirect_url
            PAPERLESS_REDIRECT_LOGIN_TO_SSO: "true"
            PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: "false"
            PAPERLESS_SOCIAL_ACCOUNT_SYNC_GROUPS: "true"
            USERMAP_UID: "1001"
            USERMAP_GID: "3000"
            PAPERLESS_REDIS: "redis://paperless-ngx-redis:6379"
            PAPERLESS_CONSUMER_POLLING: "5"
            PAPERLESS_CONSUMER_POLLING_RETRY_COUNT: "5"
            PAPERLESS_CONSUMER_POLLING_DELAY: "5"
            PAPERLESS_DBENGINE: "postgresql"
            PAPERLESS_DBHOST:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: host
            PAPERLESS_DBPORT:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: port
            PAPERLESS_DBNAME:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: dbname
            PAPERLESS_DBUSER:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: username
            PAPERLESS_DBPASS:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: password
            PAPERLESS_SECRET_KEY:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: secret-key
            PAPERLESS_ADMIN_USER:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: admin-user
            PAPERLESS_ADMIN_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: admin-password
            PAPERLESS_SOCIALACCOUNT_PROVIDERS:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: socialaccount-providers
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2048Mi
          securityContext:
            allowPrivilegeEscalation: false
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8000
                initialDelaySeconds: 30
                periodSeconds: 10
                failureThreshold: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8000
                initialDelaySeconds: 15
                periodSeconds: 10
                failureThreshold: 3

    redis:
      pod:
        securityContext:
          fsGroup: 999
          fsGroupChangePolicy: OnRootMismatch
      containers:
        redis:
          image:
            repository: redis
            tag: "7.4.8-alpine"
            digest: sha256:8b81dd37ff027bec4e516d41acfbe9fe2460070dc6d4a4570a2ac5b9d59df065
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

  service:
    paperless-ngx:
      controller: paperless-ngx
      ports:
        http:
          port: 8000
    redis:
      controller: redis
      ports:
        redis:
          port: 6379

  ingress:
    paperless-ngx:
      enabled: true
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: Document Management
        gethomepage.dev/href: "https://docs.yiannis.io"
        gethomepage.dev/group: Services
        gethomepage.dev/icon: paperless-ngx.png
        gethomepage.dev/name: Paperless-ngx
        gethomepage.dev/pod-selector: ""
        gethomepage.dev/widget.type: "paperlessngx"
        gethomepage.dev/widget.url: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
        gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_PAPERLESS_TOKEN}}`}}'
      className: "traefik"
      hosts:
        - host: "docs.yiannis.io"
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: paperless-ngx
                port: http

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/data
    media:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 20Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/media
    consume:
      enabled: true
      type: persistentVolumeClaim
      existingClaim: paperless-consume
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/consume
    export:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 2Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/export
    redis-data:
      enabled: true
      type: emptyDir
      advancedMounts:
        redis:
          redis:
            - path: /data
    redis-tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        redis:
          redis:
            - path: /tmp
