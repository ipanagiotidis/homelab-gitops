common:
  controllers:
    paperless-ngx:
      pod:
        securityContext:
          fsGroup: 1000
          fsGroupChangePolicy: OnRootMismatch
      containers:
        app:
          image:
            repository: ghcr.io/paperless-ngx/paperless-ngx
            tag: "2.16.3"
          env:
            PAPERLESS_URL: "https://docs.yiannis.io"
            PAPERLESS_PORT: "8000"
            PAPERLESS_TIME_ZONE: "Europe/Athens"
            PAPERLESS_OCR_LANGUAGE: "eng"
            PAPERLESS_REDIS: "redis://paperless-ngx-redis:6379"
            PAPERLESS_DBENGINE: "postgresql"
            PAPERLESS_DBHOST:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: host
            PAPERLESS_DBPORT:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: port
            PAPERLESS_DBNAME:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: dbname
            PAPERLESS_DBUSER:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: user
            PAPERLESS_DBPASS:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-database-app
                  key: password
            PAPERLESS_SECRET_KEY:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: secret-key
            PAPERLESS_ADMIN_USER:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: admin-user
            PAPERLESS_ADMIN_PASSWORD:
              valueFrom:
                secretKeyRef:
                  name: paperless-ngx-secret
                  key: admin-password
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2048Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8000
                initialDelaySeconds: 30
                periodSeconds: 10
                failureThreshold: 5
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /
                  port: 8000
                initialDelaySeconds: 15
                periodSeconds: 10
                failureThreshold: 3

    redis:
      pod:
        securityContext:
          fsGroup: 999
          fsGroupChangePolicy: OnRootMismatch
      containers:
        redis:
          image:
            repository: redis
            tag: "7-alpine"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

  service:
    paperless-ngx:
      controller: paperless-ngx
      ports:
        http:
          port: 8000
    redis:
      controller: redis
      ports:
        redis:
          port: 6379

  ingress:
    paperless-ngx:
      enabled: true
      annotations:
        gethomepage.dev/enabled: "true"
        gethomepage.dev/description: Document Management
        gethomepage.dev/href: "https://docs.yiannis.io"
        gethomepage.dev/group: Services
        gethomepage.dev/icon: paperless-ngx.png
        gethomepage.dev/name: Paperless-ngx
        gethomepage.dev/pod-selector: ""
        gethomepage.dev/widget.type: "paperlessngx"
        gethomepage.dev/widget.url: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
        gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PAPERLESS}}"
      ingressClassName: "traefik"
      hosts:
        - host: "docs.yiannis.io"
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: paperless-ngx
                port: http

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/data
    media:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 50Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/media
    consume:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 5Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/consume
    export:
      enabled: true
      type: persistentVolumeClaim
      storageClass: truenas-apps
      accessMode: ReadWriteOnce
      size: 10Gi
      advancedMounts:
        paperless-ngx:
          app:
            - path: /usr/src/paperless/export
    redis-data:
      enabled: true
      type: emptyDir
      advancedMounts:
        redis:
          redis:
            - path: /data
    redis-tmp:
      enabled: true
      type: emptyDir
      advancedMounts:
        redis:
          redis:
            - path: /tmp
