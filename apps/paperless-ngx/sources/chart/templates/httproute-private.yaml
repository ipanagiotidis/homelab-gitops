{{- if .Values.gatewayRoute.private.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-private
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Document Management
    gethomepage.dev/href: "https://docs.yiannis.io"
    gethomepage.dev/group: Services
    gethomepage.dev/icon: paperless-ngx.png
    gethomepage.dev/name: Paperless-ngx
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "paperlessngx"
    gethomepage.dev/widget.url: "http://paperless-ngx.paperless-ngx.svc.cluster.local:8000"
    gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_PAPERLESS_TOKEN}}`}}'
spec:
  parentRefs:
    - name: {{ .Values.gatewayRoute.private.gatewayName }}
      namespace: {{ .Values.gatewayRoute.private.gatewayNamespace }}
      sectionName: {{ .Values.gatewayRoute.private.sectionName }}
  hostnames:
    - {{ .Values.gatewayRoute.private.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.gatewayRoute.private.serviceName }}
          port: {{ .Values.gatewayRoute.private.servicePort }}
{{- end }}
