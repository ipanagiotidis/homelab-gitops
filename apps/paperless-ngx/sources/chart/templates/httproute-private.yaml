{{- if .Values.gatewayRoute.private.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: paperless-private
spec:
  parentRefs:
    - name: {{ .Values.gatewayRoute.private.gatewayName }}
      namespace: {{ .Values.gatewayRoute.private.gatewayNamespace }}
      sectionName: {{ .Values.gatewayRoute.private.sectionName }}
  hostnames:
    - {{ .Values.gatewayRoute.private.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.gatewayRoute.private.serviceName }}
          port: {{ .Values.gatewayRoute.private.servicePort }}
{{- end }}
