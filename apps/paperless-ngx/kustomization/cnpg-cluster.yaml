apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: paperless-ngx-database
  namespace: paperless-ngx
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  instances: 1

  storage:
    size: 5Gi
    storageClass: truenas-cnpg

  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true

  bootstrap:
    initdb:
      database: paperless
      owner: paperless
