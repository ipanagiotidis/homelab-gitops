apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-secret-paperless-ngx
  namespace: paperless-ngx
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: paperless-ngx-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Merge
      data:
        socialaccount-providers: |
          {
            "openid_connect": {
              "OAUTH_PKCE_ENABLED": true,
              "APPS": [
                {
                  "provider_id": "authentik",
                  "name": "Authentik",
                  "client_id": "{{ .oidc_client_id }}",
                  "secret": "{{ .oidc_client_secret }}",
                  "settings": {
                    "server_url": "{{ .oidc_issuer }}",
                    "fetch_userinfo": true
                  }
                }
              ],
              "SCOPE": ["openid", "profile", "email", "groups"]
            }
          }
        oidc_logout_redirect_url: "{{ .oidc_logout_redirect_url }}"
  data:
  - secretKey: secret-key
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_SECRET_KEY
      metadataPolicy: None
      nullBytePolicy: Ignore
  - secretKey: admin-user
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_ADMIN_USER
      metadataPolicy: None
      nullBytePolicy: Ignore
  - secretKey: admin-password
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_ADMIN_PASSWORD
      metadataPolicy: None
      nullBytePolicy: Ignore
  - secretKey: oidc_client_id
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_OIDC_CLIENT_ID
      metadataPolicy: None
      nullBytePolicy: Ignore
  - secretKey: oidc_client_secret
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_OIDC_CLIENT_SECRET
      metadataPolicy: None
      nullBytePolicy: Ignore
  - secretKey: oidc_issuer
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_OIDC_ISSUER
      metadataPolicy: None
      nullBytePolicy: Ignore
  - secretKey: oidc_logout_redirect_url
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: PAPERLESS_OIDC_LOGOUT_REDIRECT_URL
      metadataPolicy: None
      nullBytePolicy: Ignore
