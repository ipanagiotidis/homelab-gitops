global:
  imageRegistry: reg.yiannis.io
  security:
    allowInsecureImages: true

redis-cluster:
  enabled: false
postgresql:
  enabled: false
  auth:
    existingSecret: gitea-postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    nodeSelector:
      extraDiskNode: "true"
  
postgresql-ha:
  enabled: false

persistence:
  enabled: true
  create: false
  mount: true
  claimName: gitea-shared-storage-nas

nodeSelector: 
  extraDiskNode: "true" 

serviceAccount:
  automountServiceAccountToken: false

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

image:
  fullOverride: reg.yiannis.io/proxy-gitea/gitea:1.25.4-rootless@sha256:1926e89ad28358ef2146bb8a1b9c3ba24bae681cb02b72d2df11125fdc675abe

gitea:
  config:
    database:
      DB_TYPE: postgres
      HOST: gitea-database-rw.gitea.svc.cluster.local:5432
      NAME: gitea
      USER: gitea
    session:
      PROVIDER: db
    cache:
      ADAPTER: memory
    queue:
      TYPE: level
    indexer:
      ISSUE_INDEXER_TYPE: bleve
      REPO_INDEXER_ENABLED: true
    server:
      ROOT_URL: https://gitea.yiannis.io/
    service:
      DISABLE_REGISTRATION: "true"
      ENABLE_BASIC_AUTHENTICATION: "false"
      ENABLE_PASSWORD_SIGNIN_FORM: "false"
      ENABLE_CAPTCHA: "true"
      REQUIRE_EXTERNAL_REGISTRATION_CAPTCHA: "true"
      REQUIRE_CAPTCHA_FOR_LOGIN: "true"
    oauth2_client:
      ENABLE_AUTO_REGISTRATION: "true"
  oauth:
    - name: "authentik"
      provider: "openidConnect"
      existingSecret: gitea-authentik-secret
      autoDiscoverUrl: "https://authentik.yiannis.io/application/o/gitea-slug/.well-known/openid-configuration"
      iconUrl: "https://goauthentik.io/img/icon.png"
      scopes: "email profile"
  additionalConfigFromEnvs:
    - name: GITEA__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: gitea-cnpg-app
          key: password

ingress:
  enabled: false
  className: traefik
  hosts:
    - host: gitea.yiannis.io
      paths:
        - path: "/"
          pathType: Prefix
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Gitea
    gethomepage.dev/href: "https://gitea.yiannis.io/explore/repos"
    gethomepage.dev/group: Platform
    gethomepage.dev/icon: gitea.png
    gethomepage.dev/name: gitea
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "gitea"
    gethomepage.dev/widget.url: "http://gitea-http.gitea.svc.cluster.local:3000"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_GITEA}}"

valkey-cluster:
  image:
    repository: proxy-dockerhub/bitnamilegacy/valkey-cluster
    tag: 8.1.3-debian-12-r3@sha256:32869e769b7e554219f2ae527b85f4a4739574750beac63b895f5d09fc38f53b
  metrics:
    image:
      repository: proxy-dockerhub/bitnamilegacy/redis-exporter
  sysctlImage:
    repository: proxy-dockerhub/bitnamilegacy/os-shell
  volumePermissions:
    image:
      repository: proxy-dockerhub/bitnamilegacy/os-shell
