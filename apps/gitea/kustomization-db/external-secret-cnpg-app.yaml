apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-secret-gitea-cnpg-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: infisical
  target:
    name: gitea-cnpg-app
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      mergePolicy: Replace
      metadata: {}
      type: kubernetes.io/basic-auth
      data:
        username: gitea
        password: "{{ .password }}"
  data:
  - secretKey: password
    remoteRef:
      conversionStrategy: Default
      decodingStrategy: None
      key: GITEA_POSTGRES_PASSWORD
      metadataPolicy: None
      nullBytePolicy: Ignore
