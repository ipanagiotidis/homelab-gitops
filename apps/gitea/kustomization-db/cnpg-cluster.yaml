apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: gitea-database
  namespace: gitea
spec:
  instances: 1

  storage:
    size: 10Gi
    storageClass: truenas-cnpg

  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true

  bootstrap:
    initdb:
      database: gitea
      owner: gitea
      secret:
        name: gitea-cnpg-app
