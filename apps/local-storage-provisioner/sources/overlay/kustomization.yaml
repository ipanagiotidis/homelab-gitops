apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources: 
  - ../base
  - ./cilium-network-policy.yaml

images:
- name: rancher/local-path-provisioner
  newName: reg.yiannis.io/proxy-dockerhub/rancher/local-path-provisioner
  digest: sha256:34ff0847cc47ebf69656ba44a3de9324596d0036b66ffd323b21614dd8221530

patches:
- path: ./patches/roles.yaml
- patch: |-
    kind: ConfigMap
    apiVersion: v1
    metadata:
      name: local-path-config
      namespace: local-path-storage
    data:
      config.json: |-
        {
                "nodePathMap":[
                {
                        "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
                        "paths":["/var/mnt/extra"]
                }
                ]
        }
- patch: |-
    apiVersion: storage.k8s.io/v1
    kind: StorageClass
    metadata:
      name: local-path
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"    
- patch: |-
    apiVersion: v1
    kind: Namespace
    metadata:
      name: local-path-storage
      labels:
        pod-security.kubernetes.io/enforce: privileged
        security.yiannis.io/require-harbor: "true"
