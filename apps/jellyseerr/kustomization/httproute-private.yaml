apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jellyseerr-private
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/description: Request management
    gethomepage.dev/href: "https://demandeur.yiannis.io"
    gethomepage.dev/group: Media
    gethomepage.dev/icon: jellyseerr.png
    gethomepage.dev/name: Jellyseerr
    gethomepage.dev/pod-selector: ""
    gethomepage.dev/widget.type: "jellyseerr"
    gethomepage.dev/widget.url: "http://jellyseerr.media-video.svc.cluster.local:5055"
    gethomepage.dev/widget.key: '{{`{{HOMEPAGE_VAR_JELLYSEERR}}`}}'
spec:
  parentRefs:
  - name: private
    namespace: traefik
    sectionName: websecure-demandeur
  hostnames:
  - demandeur.yiannis.io
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: authentik
    backendRefs:
    - name: jellyseerr
      port: 5055
