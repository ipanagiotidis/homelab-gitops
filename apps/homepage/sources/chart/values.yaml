defaultPodOptions:
  automountServiceAccountToken: true
  enableServiceLinks: false

controllers:
  homepage:
    strategy: RollingUpdate
    revisionHistoryLimit: 3
    serviceAccount:
      identifier: default
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    containers:
      homepage:
        image:
          repository: reg.yiannis.io/proxy-ghcr/gethomepage/homepage
          tag: v1.12.3
          digest: sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a
        env:
          HOMEPAGE_ALLOWED_HOSTS: home.yiannis.io
          HOMEPAGE_VAR_ARGOCD_READONLY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: argocd-key
          HOMEPAGE_VAR_AUTHENTIK:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: authentik-key
          HOMEPAGE_VAR_GITEA:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: gitea-key
          HOMEPAGE_VAR_ADGUARD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: adguard-key
          HOMEPAGE_VAR_ADGUARD_SERVER:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: adguard-server
          HOMEPAGE_VAR_ADGUARD_USER:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: adguard-user
          HOMEPAGE_VAR_TRUENAS:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: truenas-key
          HOMEPAGE_VAR_JF:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: jf-key
          HOMEPAGE_VAR_JELLYSEERR:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: jellyseerr-key
          HOMEPAGE_VAR_PROWLARR:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: prowlarr-key
          HOMEPAGE_VAR_RADARR:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: radarr-key
          HOMEPAGE_VAR_SONARR:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: sonarr-key
          HOMEPAGE_VAR_IMMICH:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: immich-key
          HOMEPAGE_VAR_QBITTORRENT_USER:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: qbittorrent-user
          HOMEPAGE_VAR_QBITTORRENT_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: qbittorrent-password
          HOMEPAGE_VAR_PAPERLESS_TOKEN:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: paperless-token
          HOMEPAGE_VAR_SPEEDTEST:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: speedtest-key
          HOMEPAGE_VAR_TAILSCALE_DEVICE_ID:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: tailscale-device-id
                optional: true
          HOMEPAGE_VAR_TAILSCALE_API_KEY:
            valueFrom:
              secretKeyRef:
                name: homepage-secrets
                key: tailscale-api-key
                optional: true
        resources:
          requests:
            cpu: 25m
            memory: 128Mi
          limits:
            memory: 512Mi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 3000
              periodSeconds: 5
              timeoutSeconds: 1
              failureThreshold: 30

serviceAccount:
  default:
    enabled: true
    forceRename: homepage

rbac:
  roles:
    homepage:
      enabled: true
      type: ClusterRole
      forceRename: homepage
      rules:
        - apiGroups:
            - ""
          resources:
            - namespaces
            - pods
            - nodes
          verbs:
            - get
            - list
        - apiGroups:
            - extensions
            - networking.k8s.io
          resources:
            - ingresses
          verbs:
            - get
            - list
        - apiGroups:
            - traefik.containo.us
            - traefik.io
          resources:
            - ingressroutes
          verbs:
            - get
            - list
        - apiGroups:
            - gateway.networking.k8s.io
          resources:
            - httproutes
            - gateways
          verbs:
            - get
            - list
        - apiGroups:
            - metrics.k8s.io
          resources:
            - nodes
            - pods
          verbs:
            - get
            - list
        - apiGroups:
            - apiextensions.k8s.io
          resources:
            - customresourcedefinitions/status
          verbs:
            - get
  bindings:
    homepage:
      enabled: true
      type: ClusterRoleBinding
      forceRename: homepage
      roleRef:
        identifier: homepage
      subjects:
        - identifier: default

configMaps:
  homepage:
    enabled: true
    forceRename: homepage
    data:
      bookmarks.yaml: ""
      docker.yaml: ""
      kubernetes.yaml: |
        ingress: true
        mode: cluster
        traefik: true
        gateway: true
      services.yaml: |
        - Monitoring:
          - prometheus:
              description: Metrics and targets
              href: https://gfn.yiannis.io
              icon: prometheus.png
              name: prometheus
              widget:
                type: prometheus
                url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
          - edge-health:
              description: Public Gateway health from Traefik metrics
              href: https://gfn.yiannis.io/d/edge-overview/edge-overview
              icon: prometheus.png
              name: Edge Health from Traefik
              widget:
                type: prometheusmetric
                url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                metrics:
                  - label: Public req 24h
                    query: sum(increase(traefik_router_requests_total{router=~".*public-gw.*"}[24h])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
                  - label: Public 5xx 24h
                    query: sum(increase(traefik_router_requests_total{router=~".*public-gw.*",code=~"5.."}[24h])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
                  - label: Public 4xx 24h
                    query: sum(increase(traefik_router_requests_total{router=~".*public-gw.*",code=~"4.."}[24h])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
          - security-health:
              description: CrowdSec security signal from Prometheus
              href: https://gfn.yiannis.io/d/crowdsec-overview/crowdsec-overview
              icon: crowdsec.png
              name: Security Health
              widget:
                type: prometheusmetric
                url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                metrics:
                  - label: Active bans
                    query: sum(cs_active_decisions) or vector(0)
                    format:
                      type: number
                  - label: Parser errors/s
                    query: sum(rate(cs_parser_hits_ko_total[5m])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 2
                  - label: Bouncer req/s
                    query: sum(rate(cs_lapi_bouncer_requests_total[5m])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 2
                  - label: LAPI p95
                    query: histogram_quantile(0.95, sum(rate(cs_lapi_request_duration_seconds_bucket[5m])) by (le)) or vector(0)
                    format:
                      type: number
                      options:
                        style: unit
                        unit: second
        - Edge:
          - cloudflared:
              description: Cloudflare Tunnel metrics from Prometheus
              href: https://gfn.yiannis.io/d/cloudflared-tunnel/cloudflared-tunnel
              icon: prometheus.png
              name: Cloudflared
              widget:
                type: prometheusmetric
                url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
                metrics:
                  - label: HA conn
                    query: sum(cloudflared_tunnel_ha_connections) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
                  - label: Req 24h
                    query: sum(increase(cloudflared_tunnel_total_requests[24h])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
                  - label: Errors 24h
                    query: sum(increase(cloudflared_tunnel_request_errors[24h])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
                  - label: Reg fails 24h
                    query: sum(increase(cloudflared_tunnel_tunnel_register_fail[24h])) or vector(0)
                    format:
                      type: number
                      options:
                        maximumFractionDigits: 0
          - tailscale-router:
              description: Tailnet router health
              href: https://login.tailscale.com/admin/machines
              icon: tailscale.png
              name: Tailscale Router
              widget:
                type: tailscale
                deviceid: '{{`{{HOMEPAGE_VAR_TAILSCALE_DEVICE_ID}}`}}'
                key: '{{`{{HOMEPAGE_VAR_TAILSCALE_API_KEY}}`}}'
        - Infrastructure:
          - adguard:
              description: Adguard
              href: '{{`{{HOMEPAGE_VAR_ADGUARD_SERVER}}`}}'
              icon: adguard-home.png
              name: adguard
              widget:
                type: adguard
                url: '{{`{{HOMEPAGE_VAR_ADGUARD_SERVER}}`}}'
                username: '{{`{{HOMEPAGE_VAR_ADGUARD_USER}}`}}'
                password: '{{`{{HOMEPAGE_VAR_ADGUARD}}`}}'
          - truenas:
              description: NAS and storage status
              href: https://truenas.yiannis.io
              icon: truenas.png
              name: truenas
              widget:
                type: truenas
                url: https://truenas.yiannis.io
                key: '{{`{{HOMEPAGE_VAR_TRUENAS}}`}}'
                version: 2
      settings.yaml: |
        title: Homepage Private
        headerStyle: boxed
        layout:
          Platform:
          Monitoring:
          Edge:
          Services:
          Infrastructure:
          Media:
      widgets.yaml: |
        - kubernetes:
            cluster:
              show: true
              cpu: true
              memory: true
              showLabel: true
              label: k8s-homelab
            nodes:
              show: true
              cpu: true
              memory: true
              showLabel: true

service:
  homepage:
    controller: homepage
    primary: true
    ports:
      http:
        port: 3000

ingress:
  homepage:
    enabled: false

persistence:
  base-config:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config

  homepage-config:
    enabled: true
    type: configMap
    identifier: homepage
    advancedMounts:
      homepage:
        homepage:
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
            readOnly: true
          - path: /app/config/docker.yaml
            subPath: docker.yaml
            readOnly: true
          - path: /app/config/kubernetes.yaml
            subPath: kubernetes.yaml
            readOnly: true
          - path: /app/config/services.yaml
            subPath: services.yaml
            readOnly: true
          - path: /app/config/settings.yaml
            subPath: settings.yaml
            readOnly: true
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
            readOnly: true

  logs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /app/config/logs

  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp
